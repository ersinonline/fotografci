<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cut istanbul - creative unit team</title>
    <link rel="icon" type="image/png" href="https://i.hizliresim.com/mm3mekd.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #ffffff;
            color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-section {
            margin-bottom: 40px;
        }

        .logo {
            width: 280px;
            height: auto;
            margin-bottom: 20px;
        }

        .brand-name {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -1px;
            color: #000000;
        }

        .brand-subtitle {
            font-size: 0.9rem;
            color: #ff0000;
            font-weight: 500;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .link-button {
            background-color: #000000;
            color: #ffffff;
            padding: 18px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            min-height: 56px;
        }

        .link-button:hover {
            background-color: #ff0000;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 0, 0, 0.3);
        }

        .link-button:active {
            transform: translateY(0);
        }

        .icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .footer {
            margin-top: auto;
            padding-top: 40px;
            opacity: 0.7;
            font-size: 0.85rem;
            color: #000000;
        }

        @media (max-width: 480px) {
            .container {
                max-width: 320px;
            }
            
            .logo {
                width: 220px;
            }
            
            .brand-name {
                font-size: 2rem;
            }
            
            .link-button {
                padding: 16px 20px;
                font-size: 0.95rem;
            }
        }

        @media (min-width: 768px) {
            .container {
                max-width: 480px;
            }
            
            .logo {
                width: 320px;
            }
            
            .brand-name {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
